version: 1.4.4.{build}
image: Visual Studio 2022

# Hanya build jika ada TAG (seperti v1.0.0)
skip_non_tags: true

environment:
  PYTHON_DIR: "C:\\Python312-x64"
  # Hubungkan variabel rahasia dari UI AppVeyor ke lingkungan build
  GH_TOKEN: $(GH_TOKEN) 

build: off

install:
  # 0. Install GitHub CLI (diperlukan untuk pengiriman otomatis)
  - choco install gh --no-progress
  
  # 1. Setup Python PATH
  - set PATH=%PYTHON_DIR%;%PYTHON_DIR%\Scripts;%PATH%
  
  # 2. Setup Rust toolchain
  - curl -sSf -o rustup-init.exe https://win.rustup.rs/
  - rustup-init.exe -y --default-toolchain stable --default-host x86_64-pc-windows-msvc
  - set PATH=%PATH%;%USERPROFILE%\.cargo\bin
  - rustc --version

  # 3. Log environment info
  - python --version
  - pip --version

  # 4. Install Dependencies
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install pyinstaller
  
  # 5. Localize FFmpeg for PyInstaller (Binary Bundling)
  - ps: |
      $chocoBin = "C:\ProgramData\chocolatey\bin"
      $targetFfmpeg = Join-Path $chocoBin "ffmpeg.exe"
      
      if (-not (Test-Path $targetFfmpeg)) {
          echo "FFmpeg not found. Installing via choco..."
          choco install ffmpeg -y --no-progress
      }
      
      if (Test-Path $targetFfmpeg) {
          copy $targetFfmpeg .
          copy (Join-Path $chocoBin "ffprobe.exe") .
          echo "FFmpeg localized from Chocolatey bin."
      } else {
          # Last resort detection
          $where = where.exe ffmpeg
          if ($where) { 
              copy $where[0] . 
              echo "FFmpeg localized via 'where' fallback."
          } else {
              echo "CRITICAL: FFmpeg still not found!"
              exit 1
          }
      }

build_script:
  # 1. Build Rust Core
  - cd core-engine
  - maturin build --release
  - ps: Get-ChildItem target/wheels/*.whl | ForEach-Object { pip install $_.FullName }
  - cd ..
  
  # 2. Build Main Application
  - pyinstaller --noconfirm clipperr.spec

after_build:
  - ps: |
      $zipName = "clipperr-windows-$($env:APPVEYOR_REPO_TAG_NAME).zip"
      echo "Zipping as $zipName..."
      Compress-Archive -Path dist/clipperr/* -DestinationPath $zipName
      # Simpan nama zip ke environment agar bisa dipakai di tahap berikutnya
      $env:FINAL_ZIP = $zipName

artifacts:
  - path: clipperr-windows-*.zip
    name: clipperr-windows-binary

# Pengiriman menggunakan GitHub CLI (otomatis buat rilis & unggah)
deploy_script:
  - ps: |
      if ($env:APPVEYOR_REPO_TAG -eq "true") {
        # 1. Diagnostic: Check if Token exists
        if (-not $env:GH_TOKEN) {
            echo "CRITICAL ERROR: GH_TOKEN is not set in AppVeyor Environment variables!"
            echo "Please go to AppVeyor UI -> Settings -> Environment and add GH_TOKEN."
            exit 1
        }
        
        $tag = $env:APPVEYOR_REPO_TAG_NAME
        $zip = "clipperr-windows-$($tag).zip"
        
        echo "Attempting to deploy $zip to GitHub Release $tag..."
        
        # 2. Check build artifact exists
        if (-not (Test-Path $zip)) {
            echo "ERROR: Artifact $zip not found in root directory!"
            exit 1
        }

        # 3. Check if release already exists
        $releaseCheck = & "C:\Program Files\GitHub CLI\gh.exe" release view $tag 2>&1
        if ($LASTEXITCODE -eq 0) {
            echo "Release $tag already exists. Uploading $zip..."
            & "C:\Program Files\GitHub CLI\gh.exe" release upload $tag $zip --clobber
        } else {
            echo "Creating new release $tag and uploading $zip..."
            & "C:\Program Files\GitHub CLI\gh.exe" release create $tag $zip --title "clipperr $tag" --notes "Automated release for version $tag" --generate-notes
        }
        
        if ($LASTEXITCODE -ne 0) {
            echo "DEPLOYMENT FAILED. This is likely due to an invalid or expired GH_TOKEN."
            echo "Please verify the token has 'repo' scopes and is correctly pasted in AppVeyor."
            exit 1
        }
        
        echo "Deployment successful!"
      }
