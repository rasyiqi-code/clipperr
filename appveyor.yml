version: 1.2.9.{build}
image: Visual Studio 2022

# Hanya build jika ada TAG (seperti v1.0.0)
skip_non_tags: true

environment:
  PYTHON_DIR: "C:\\Python312-x64"
  # Hubungkan variabel rahasia dari UI AppVeyor ke lingkungan build
  GH_TOKEN: $(GH_TOKEN) 

build: off

install:
  # 0. Install GitHub CLI (diperlukan untuk pengiriman otomatis)
  - choco install gh --no-progress
  
  # 1. Setup Python PATH
  - set PATH=%PYTHON_DIR%;%PYTHON_DIR%\Scripts;%PATH%
  
  # 2. Setup Rust toolchain
  - curl -sSf -o rustup-init.exe https://win.rustup.rs/
  - rustup-init.exe -y --default-toolchain stable --default-host x86_64-pc-windows-msvc
  - set PATH=%PATH%;%USERPROFILE%\.cargo\bin
  - rustc --version

  # 3. Log environment info
  - python --version
  - pip --version

  # 4. Install Dependencies
  - python -m pip install --upgrade pip
  - pip install -r requirements.txt
  - pip install pyinstaller

build_script:
  # 1. Build Rust Core
  - cd core-engine
  - maturin build --release
  - ps: Get-ChildItem target/wheels/*.whl | ForEach-Object { pip install $_.FullName }
  - cd ..
  
  # 2. Build Main Application
  - pyinstaller --noconfirm clipperr.spec

after_build:
  - ps: |
      $zipName = "clipperr-windows-$($env:APPVEYOR_REPO_TAG_NAME).zip"
      echo "Zipping as $zipName..."
      Compress-Archive -Path dist/clipperr/* -DestinationPath $zipName
      # Simpan nama zip ke environment agar bisa dipakai di tahap berikutnya
      $env:FINAL_ZIP = $zipName

artifacts:
  - path: clipperr-windows-*.zip
    name: clipperr-windows-binary

# Pengiriman menggunakan GitHub CLI (otomatis buat rilis & unggah)
deploy_script:
  - ps: |
      if ($env:APPVEYOR_REPO_TAG -eq "true") {
        # GitHub CLI secara otomatis menggunakan lingkungan GH_TOKEN jika tersedia
        
        $tag = $env:APPVEYOR_REPO_TAG_NAME
        $zip = "clipperr-windows-$($tag).zip"
        
        # Cek apakah rilis sudah ada
        $releaseCheck = & "C:\Program Files\GitHub CLI\gh.exe" release view $tag 2>&1
        if ($LASTEXITCODE -eq 0) {
            echo "Rilis $tag sudah ada. Mengunggah $zip ke rilis yang sudah ada..."
            & "C:\Program Files\GitHub CLI\gh.exe" release upload $tag $zip --clobber
        } else {
            echo "Membuat rilis baru $tag dan mengunggah $zip..."
            & "C:\Program Files\GitHub CLI\gh.exe" release create $tag $zip --title "clipperr $tag" --notes "Rilis otomatis untuk versi $tag" --generate-notes
        }
      }
